name: Set up Buildx and log in to GHCR
description: Shared Buildx + GHCR login for the docker build jobs.
runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

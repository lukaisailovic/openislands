name: Release

# Manual, maintainer-gated release. Bumps every published package to one shared
# version, tags vX.Y.Z, publishes to npm via OIDC trusted publishing (no tokens),
# and cuts a GitHub release. Dispatch-only, so forks and pull requests never run it.
#
# npm trusted publishing is configured against THIS filename (release.yml). Renaming
# it breaks publishing until the trusted publisher on npmjs.com is updated.
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver bump
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: Build and validate without publishing or pushing anything
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Bump, publish & tag
    runs-on: ubuntu-latest
    # Records each run as a deployment under the `npm` environment; the URL is
    # evaluated after the steps run, so it links to the exact version just published.
    environment:
      name: npm
      url: https://www.npmjs.com/package/openislands/v/${{ steps.version.outputs.version }}
    if: github.repository == 'lukaisailovic/openislands'
    permissions:
      contents: write # bump commit, tag, push, GitHub release
      id-token: write # npm OIDC trusted publishing + provenance
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      major_minor: ${{ steps.version.outputs.major_minor }}
    steps:
      # Checkout over SSH with a write deploy key. `main` is protected by the `prod`
      # ruleset (required PR + status checks); the deploy key is on that ruleset's
      # bypass list, so the bump commit + tag can be pushed directly. persist-credentials
      # keeps the SSH config so the later `git push` reuses the key.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ssh-key: ${{ secrets.RELEASE_SSH_KEY }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      # Build before typecheck: vite build generates the runtime's routeTree.gen.ts.
      - name: Lint, build, typecheck & test
        run: |
          pnpm lint
          pnpm build
          pnpm typecheck
          pnpm test

      - name: Resolve and apply next version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          version="$(cd packages/cli && npm version "$RELEASE_TYPE" --no-git-tag-version --no-commit-hooks)"
          version="${version#v}"
          for d in compiler connector-kit mcp-server runtime schema storage; do
            (cd "packages/$d" && npm version "$version" --no-git-tag-version --no-commit-hooks --allow-same-version >/dev/null)
          done
          {
            echo "version=$version"
            echo "tag=v$version"
            echo "major_minor=${version%.*}"
          } >> "$GITHUB_OUTPUT"

      - name: Preflight — refuse to clobber an existing release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::git tag ${TAG} already exists"; exit 1
          fi
          if npm view "openislands@${VERSION}" version >/dev/null 2>&1; then
            echo "::error::openislands@${VERSION} is already published to npm"; exit 1
          fi

      - name: Commit and tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -am "chore(release): v${VERSION}"
          git tag -a "${TAG}" -m "openislands ${VERSION}"

      # Push commit + tag together BEFORE publishing, so a blocked push fails the
      # run before anything reaches npm.
      - name: Push commit and tag
        if: ${{ !inputs.dry_run }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: git push --atomic origin "HEAD:${{ github.ref_name }}" "refs/tags/${TAG}"

      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10, and
      # pnpm delegates the actual upload to it.
      - name: Upgrade npm for OIDC trusted publishing
        if: ${{ !inputs.dry_run }}
        run: npm install -g npm@latest

      # No NPM_TOKEN: npm mints a short-lived token from id-token:write. pnpm
      # resolves workspace:* and hands each tarball to npm.
      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: pnpm -r publish --no-git-checks --provenance --access public

      - name: Validate publish (dry run)
        if: ${{ inputs.dry_run }}
        run: pnpm -r publish --no-git-checks --access public --dry-run

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release create "${TAG}" --generate-notes --verify-tag --title "${TAG}" --latest

  # Multi-arch image (amd64 + arm64 — a NAS may be ARM) built on NATIVE runners in
  # parallel (no QEMU emulation), each pushed by digest. `needs: release` keeps the
  # original ordering: docker runs only after npm is published + tagged, so a docker
  # failure leaves a published release rather than an un-tagged npm publish behind a
  # half-built image. The whole docker pipeline is skipped on dry_run.
  docker-build:
    name: Build image (${{ matrix.arch }})
    needs: release
    if: ${{ !inputs.dry_run }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      # Check out the bump commit (the tag), so the image carries the released version.
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          persist-credentials: false
      - uses: ./.github/actions/ghcr-buildx
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into one multi-arch manifest, apply the version
  # tags, and attest the manifest. Tags pushed: X.Y.Z, X.Y, latest.
  docker-merge:
    name: Publish multi-arch manifest
    needs: [release, docker-build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # image build provenance
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ./.github/actions/ghcr-buildx
      - name: Create manifest and push tags
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ needs.release.outputs.version }}
          MAJOR_MINOR: ${{ needs.release.outputs.major_minor }}
        run: |
          # shellcheck disable=SC2046 # word-splitting is intentional: one arg per digest
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${MAJOR_MINOR}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)
      - name: Resolve manifest digest
        id: digest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ needs.release.outputs.version }}
        run: echo "digest=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{.Manifest.Digest}}')" >> "$GITHUB_OUTPUT"
      # Attestation lands in GitHub's native store (verify with `gh attestation verify
      # oci://...`). Not pushed to the registry — that fallback creates a
      # `sha256-<digest>` referrer tag that clutters the tag list.
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}

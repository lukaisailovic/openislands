name: Release

# Manual, maintainer-gated release. Bumps every published package to one shared
# version, tags vX.Y.Z, publishes to npm via OIDC trusted publishing (no tokens),
# and cuts a GitHub release. Dispatch-only, so forks and pull requests never run it.
#
# npm trusted publishing is configured against THIS filename (release.yml). Renaming
# it breaks publishing until the trusted publisher on npmjs.com is updated.
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver bump
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: Build and validate without publishing or pushing anything
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Bump, publish & tag
    runs-on: ubuntu-latest
    if: github.repository == 'lukaisailovic/openislands'
    permissions:
      contents: write # bump commit, tag, push, GitHub release
      id-token: write # npm OIDC trusted publishing + provenance
      packages: write # push versioned + :latest images to GHCR
      attestations: write # image build provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile

      # Build before typecheck: vite build generates the runtime's routeTree.gen.ts.
      - name: Lint, build, typecheck & test
        run: |
          pnpm lint
          pnpm build
          pnpm typecheck
          pnpm test

      - name: Resolve and apply next version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          version="$(cd packages/cli && npm version "$RELEASE_TYPE" --no-git-tag-version --no-commit-hooks)"
          version="${version#v}"
          for d in compiler connector-kit mcp-server runtime schema storage; do
            (cd "packages/$d" && npm version "$version" --no-git-tag-version --no-commit-hooks --allow-same-version >/dev/null)
          done
          {
            echo "version=$version"
            echo "tag=v$version"
            echo "major_minor=${version%.*}"
          } >> "$GITHUB_OUTPUT"

      - name: Preflight — refuse to clobber an existing release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::git tag ${TAG} already exists"; exit 1
          fi
          if npm view "openislands@${VERSION}" version >/dev/null 2>&1; then
            echo "::error::openislands@${VERSION} is already published to npm"; exit 1
          fi

      - name: Commit and tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -am "chore(release): v${VERSION}"
          git tag -a "${TAG}" -m "openislands ${VERSION}"

      # Push commit + tag together BEFORE publishing, so a blocked push fails the
      # run before anything reaches npm.
      - name: Push commit and tag
        if: ${{ !inputs.dry_run }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: git push --atomic origin "HEAD:${{ github.ref_name }}" "refs/tags/${TAG}"

      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10, and
      # pnpm delegates the actual upload to it.
      - name: Upgrade npm for OIDC trusted publishing
        if: ${{ !inputs.dry_run }}
        run: npm install -g npm@latest

      # No NPM_TOKEN: npm mints a short-lived token from id-token:write. pnpm
      # resolves workspace:* and hands each tarball to npm.
      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: pnpm -r publish --no-git-checks --provenance --access public

      - name: Validate publish (dry run)
        if: ${{ inputs.dry_run }}
        run: pnpm -r publish --no-git-checks --access public --dry-run

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release create "${TAG}" --generate-notes --verify-tag --title "${TAG}" --latest

      # Multi-arch image (amd64 + arm64 — a NAS may be ARM) for the versioned + :latest
      # tags. Runs AFTER the npm publish on purpose: npm is the source of truth, so a
      # docker failure here leaves a published, tagged release rather than stranding an
      # un-tagged npm publish behind a half-built image. Skipped entirely on dry_run.
      - name: Set up QEMU
        if: ${{ !inputs.dry_run }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ !inputs.dry_run }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        if: ${{ !inputs.dry_run }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and push image
        id: push
        if: ${{ !inputs.dry_run }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest image provenance
        if: ${{ !inputs.dry_run }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
